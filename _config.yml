# Site settings
title: Valentina Krauß
tagline: Hochzeits- und Eventplanung · Hochzeits- und Trauerreden
email: valentina.krauss@outlook.de
description: >- # this means to ignore newlines until "baseurl:"
  Valentina Krauß – Hochzeits- und Eventplanung sowie einfühlsame
  Hochzeits- und Trauerreden. Für Momente, die in Erinnerung bleiben.
lang: de
baseurl: "" # set by the GitHub Pages build (--baseurl); leave empty here
url: "" # e.g. https://valentina-krauss.de

# Kontakt & Social
phone: "+49 176 84519457"
instagram_username: valentina.krauss.events

# Build settings
markdown: kramdown

# Portfolio is a proper Jekyll collection: one Markdown file per project
# in _portfolio/, each rendered as its own detail page.
collections:
  portfolio:
    output: true
    permalink: /referenzen/:name/

# Front-matter defaults so portfolio items get the detail layout automatically.
defaults:
  - scope:
      path: ""
      type: portfolio
    values:
      layout: portfolio

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .sass-cache/
  - .jekyll-cache/
  - README.md
