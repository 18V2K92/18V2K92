# Leistungen. Reihenfolge = Anzeige-Reihenfolge. Icon = Font-Awesome-4-Klasse.

- icon: fa-heart
  title: Hochzeitsplanung
  text: >-
    Von der ersten Idee bis zum letzten Tanz – ich plane und koordiniere Ihren
    großen Tag, damit Sie ihn unbeschwert genießen können.

- icon: fa-glass
  title: Eventplanung
  text: >-
    Firmenfeier, Jubiläum oder privater Anlass: Ich organisiere Veranstaltungen
    mit klarer Struktur, kreativem Konzept und dem gewissen Etwas.

- icon: fa-microphone
  title: Hochzeitsreden
  text: >-
    Persönliche, humorvolle und berührende Worte für Ihre Trauung – frei
    gehalten oder als fertiger Text für Sie zum Vortragen.

- icon: fa-leaf
  title: Trauerreden
  text: >-
    Ein würdevoller Abschied in Ihren Worten. Einfühlsam gestaltete Trauerreden,
    die dem Leben eines geliebten Menschen gerecht werden.
