---
layout: default
---
<article class="subpage-section">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 col-lg-offset-2">
        {% if page.category %}<div class="project-category text-primary">{{ page.category }}</div>{% endif %}
        <h1 class="section-heading">{{ page.title }}</h1>
        <hr class="primary" style="margin-left: 0;">
        {% if page.image %}
        <img src="{{ page.image | relative_url }}" class="img-responsive" alt="{{ page.title }}" style="margin: 30px 0; width: 100%;">
        {% endif %}
        {{ content }}
        <p style="margin-top: 40px;">
          <a href="{{ '/#portfolio' | relative_url }}" class="btn btn-primary">&larr; Zurück zu den Referenzen</a>
        </p>
      </div>
    </div>
  </div>
</article>
